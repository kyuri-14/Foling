     Foling app icon for macOS only (icon.icns).

     macOS does not draw app icons edge to edge. Since Big Sur, the grid puts
     the icon body in an 824x824 square centred on a 1024x1024 canvas, leaving
     a 100pt margin all round for the Dock's shadow and hover scaling. An icon
     generated full-bleed therefore renders about 24% wider than every native
     app sitting next to it — which is exactly what Foling did before this file
     existed.

     Same artwork as foling.svg, inset to that 824/1024 = 80.5% body.
     The transform reads right to left: move the mark's own origin to (0,0),
     scale 1352.701 -> 824, then offset by the 100pt margin. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024"
     style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
