name: Release

# Build installers for each OS and publish a GitHub Release when a version
# tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # Universal binary → runs natively on both Apple Silicon and Intel.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS x86_64 target (for the universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build & publish app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Update-signing key for the Tauri updater (NOT OS code signing).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # OS code signing / notarization secrets go here when a certificate
          # is available (Windows: certificate; macOS: Apple ID + team).
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Foling ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # The MCP server is a second binary from the same crate. It is published
      # as a plain executable rather than bundled into the installer: users
      # point an agent CLI's .mcp.json at it by path, and it has to be runnable
      # with the app closed.
      - name: Build foling-mcp (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: src-tauri
        shell: bash
        run: |
          cargo build --release --bin foling-mcp
          cp target/release/foling-mcp.exe ../foling-mcp-windows-x86_64.exe

      - name: Build foling-mcp (macOS universal)
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri
        run: |
          cargo build --release --bin foling-mcp --target aarch64-apple-darwin
          cargo build --release --bin foling-mcp --target x86_64-apple-darwin
          lipo -create -output ../foling-mcp-macos-universal \
            target/aarch64-apple-darwin/release/foling-mcp \
            target/x86_64-apple-darwin/release/foling-mcp

      - name: Build foling-mcp (Linux)
        if: matrix.platform == 'ubuntu-latest'
        working-directory: src-tauri
        run: |
          cargo build --release --bin foling-mcp
          cp target/release/foling-mcp ../foling-mcp-linux-x86_64

      # shell: bash on every OS — the default on Windows runners is PowerShell,
      # which does not glob-expand arguments to native commands, so gh would be
      # handed the literal string "foling-mcp-*" and fail to find it.
      - name: Attach foling-mcp to the release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" foling-mcp-* --clobber
